# App Watch — minimal Compose sample (same as the tracked docker-compose.yml).
# Copy to docker-compose.yml or use as a reference; data is stored in ./data on the host.
# For a fixed host path (e.g. /docker-data/...), use docker-compose.override.yml — see README.

services:
  app-watch:
    image: rajnishdock/app-watch:latest
    container_name: app-watch
    restart: unless-stopped
    ports:
      - "8192:8192"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8192/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
