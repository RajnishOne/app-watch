services:
  app-watch:
    image: rajnishdock/app-watch:latest
    container_name: app-watch
    restart: unless-stopped
    ports:
      - "8192:8192"
    volumes:
      - /docker-data/app-watch/data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8192/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
